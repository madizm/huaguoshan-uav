# Nginx unified entry point for the Huaguoshan UAV platform.
#
# Path mapping:
#   /              → SPA frontend (web/dist)
#   /frontend/     → Legacy frontend (including tianditu-3d.html)
#   /js/           → Legacy frontend shared scripts
#   /auth/         → 认证入口服务 (FastAPI on AUTH_SERVICE_HOST:AUTH_SERVICE_PORT)
#   /postgrest/    → PostgREST (on PGRST_HOST:PGRST_PORT)
#   /docs/         → Scalar API documentation portal (static + proxy)
#
# This is the required deployment shape per ADR-0005. All services are reached
# through the same origin so CORS configuration stays simple.
#
# Deployment defaults used by the current development host:
#   Repository root: /mnt/project/huaguoshan
#   认证入口服务 upstream: 127.0.0.1:13001
#   PostgREST upstream: 127.0.0.1:13000
#   Nginx listen port: 20000

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;

    # ── Upstream definitions ──────────────────────────────────────────

    upstream auth_service {
        server 127.0.0.1:13001;
    }

    upstream postgrest {
        server 127.0.0.1:13000;
    }

    # ── Main server block ─────────────────────────────────────────────

    server {
        listen 20000;
        server_name _;

        # Increase proxy buffers for potentially large OpenAPI responses.
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        # ── Legacy frontend (/frontend/ and /js/) ──────────────────────

        # Keep /frontend/tianditu-3d.html and its relative resources
        # available alongside the SPA.
        location ^~ /frontend/ {
            root /mnt/project/huaguoshan;
            try_files $uri =404;
        }

        # tianditu-3d.html references shared scripts through ../js/.
        location ^~ /js/ {
            root /mnt/project/huaguoshan;
            try_files $uri =404;
        }

        # ── SPA frontend (/) ───────────────────────────────────────────

        location / {
            root  /mnt/project/huaguoshan/web/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── 认证入口服务 (/auth/) ─────────────────────────────────────

        location /auth/ {
            proxy_pass http://auth_service;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Auth service OpenAPI (anonymous) ──────────────────────────

        location = /openapi.json {
            proxy_pass http://auth_service/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check ──────────────────────────────────────────────

        location = /healthz {
            proxy_pass http://auth_service/healthz;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── PostgREST (/postgrest/) ────────────────────────────────────

        location /postgrest/ {
            # Strip /postgrest prefix. /postgrest/no_fly_zone → /no_fly_zone.
            rewrite ^/postgrest(/.*)$ $1 break;
            proxy_pass http://postgrest;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass through the Authorization header so PostgREST can validate JWTs.
            proxy_pass_request_headers on;
        }

        # ── Scalar API Documentation Portal (/docs/) ───────────────────

        location /docs/ {
            alias /mnt/project/huaguoshan/deploy/docs/;
            index index.html;
            try_files $uri $uri/ /docs/index.html;
        }
    }
}
