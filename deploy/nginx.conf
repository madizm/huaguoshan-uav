# Nginx unified entry point for the Huaguoshan UAV platform.
#
# Path mapping:
#   /              → Frontend (static files)
#   /auth/         → 认证入口服务 (FastAPI on AUTH_SERVICE_HOST:AUTH_SERVICE_PORT)
#   /postgrest/    → PostgREST (on PGRST_HOST:PGRST_PORT)
#   /docs/         → Scalar API documentation portal (static + proxy)
#
# This is the required deployment shape per ADR-0005. All services are reached
# through the same origin so CORS configuration stays simple.
#
# Environment variables used (set in docker-compose or deployment automation):
#   FRONTEND_ROOT      – path to frontend directory (default /usr/share/nginx/html)
#   AUTH_PROXY_PASS    – upstream URL for the 认证入口服务 (default http://127.0.0.1:8000)
#   PGRST_PROXY_PASS   – upstream URL for PostgREST (default http://127.0.0.1:13000)
#   PGRST_SERVER_PORT  – the port Nginx listens on (default 80)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;

    # ── Upstream definitions ──────────────────────────────────────────

    upstream auth_service {
        server 127.0.0.1:8000;
    }

    upstream postgrest {
        server 127.0.0.1:13000;
    }

    # ── Main server block ─────────────────────────────────────────────

    server {
        listen 80;
        server_name _;

        # Increase proxy buffers for potentially large OpenAPI responses.
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        # ── Frontend (/) ───────────────────────────────────────────────

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── 认证入口服务 (/auth/) ─────────────────────────────────────
        location /auth/ {
            proxy_pass http://auth_service;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # The 认证入口服务 also has /healthz at its root. Route /auth/healthz
            # through the same rewrite and proxy_pass.
        }

        # Explicit /healthz alias so smoke tests can hit it directly.
        # Auth service FastAPI OpenAPI (served at /openapi.json by FastAPI).
        location = /openapi.json {
            proxy_pass http://auth_service/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Explicit /healthz alias so smoke tests can hit it directly.
        location = /healthz {
            proxy_pass http://auth_service/healthz;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── PostgREST (/postgrest/) ────────────────────────────────────

        location /postgrest/ {
            # Strip /postgrest prefix. /postgrest/no_fly_zone → /no_fly_zone.
            rewrite ^/postgrest(/.*)$ $1 break;
            proxy_pass http://postgrest;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass through the Authorization header so PostgREST can validate JWTs.
            proxy_pass_request_headers on;
        }

        # ── Scalar API Documentation Portal (/docs/) ───────────────────

        location /docs/ {
            alias /usr/share/nginx/html/docs/;
            index index.html;
            try_files $uri $uri/ /docs/index.html;
        }
    }
}
